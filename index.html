<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Project Munro, a calm map-first hiking tracker for logging peaks."
    />
    <title>Project Munro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #222f30;
        --paper: #f7f7f5;
        --white: #fff;
        --shadow: 0 22px 70px rgba(14, 24, 22, 0.24);
      }

      * {
        box-sizing: border-box;
      }

      body {
        background: var(--paper);
        margin: 0;
        min-height: 100svh;
      }

      .hero {
        background: #15201f;
        border-radius: clamp(1rem, 2vw, 1.65rem);
        box-shadow: var(--shadow);
        color: var(--white);
        margin: clamp(0.7rem, 1.75vw, 1.5rem);
        min-height: calc(100svh - clamp(1.4rem, 3.5vw, 3rem));
        overflow: hidden;
        position: relative;
      }

      .hero::before {
        background:
          linear-gradient(90deg, rgba(3, 9, 8, 0.5), rgba(3, 9, 8, 0.12) 48%, rgba(3, 9, 8, 0.08)),
          linear-gradient(0deg, rgba(3, 9, 8, 0.66), transparent 45%),
          linear-gradient(180deg, rgba(3, 9, 8, 0.25), transparent 28%);
        content: "";
        inset: 0;
        pointer-events: none;
        position: absolute;
        z-index: 1;
      }

      .hero__bg {
        display: block;
        height: 100%;
        inset: 0;
        object-fit: cover;
        object-position: center center;
        position: absolute;
        transform: scale(1.012);
        width: 100%;
      }

      .hero__cta {
        align-items: center;
        backdrop-filter: blur(18px);
        background: rgba(247, 247, 245, 0.86);
        border: 1px solid rgba(255, 255, 255, 0.64);
        border-radius: 999px;
        color: var(--ink);
        display: inline-flex;
        font: 850 clamp(0.66rem, 0.9vw, 0.78rem) / 1 Arial, sans-serif;
        justify-content: center;
        letter-spacing: 0.08em;
        min-height: 3rem;
        padding: 0.86rem 1.18rem;
        position: absolute;
        right: clamp(1rem, 2.5vw, 2.4rem);
        text-decoration: none;
        text-transform: uppercase;
        top: clamp(1rem, 2.1vw, 1.85rem);
        transition: background 180ms ease, color 180ms ease, transform 180ms ease;
        z-index: 2;
      }

      .hero__cta:hover,
      .hero__cta:focus {
        background: var(--white);
        color: var(--ink);
        transform: translateY(-1px);
      }

      .hero__title {
        bottom: clamp(1.2rem, 3vw, 3rem);
        color: var(--white);
        font-family: Fraunces, Georgia, "Times New Roman", serif;
        font-size: clamp(4rem, 11vw, 10.2rem);
        font-weight: 400;
        left: clamp(1.2rem, 3vw, 3rem);
        letter-spacing: 0;
        line-height: 0.86;
        margin: 0;
        max-width: min(78rem, 88vw);
        position: absolute;
        text-shadow: 0 2px 32px rgba(0, 0, 0, 0.46);
        z-index: 2;
      }

      @media (max-width: 59.9375em) {
        .hero {
          margin: 0.55rem;
          min-height: calc(100svh - 1.1rem);
        }

        .hero::before {
          background:
            linear-gradient(90deg, rgba(3, 9, 8, 0.54), rgba(3, 9, 8, 0.18)),
            linear-gradient(0deg, rgba(3, 9, 8, 0.76), transparent 52%),
            linear-gradient(180deg, rgba(3, 9, 8, 0.34), transparent 32%);
        }

        .hero__cta {
          min-height: 2.75rem;
          padding: 0.78rem 0.95rem;
          right: 0.85rem;
          top: 0.85rem;
        }

        .hero__title {
          bottom: 1rem;
          font-size: clamp(3.4rem, 18vw, 6.4rem);
          left: 1rem;
          max-width: 8ch;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .hero__cta {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="hero" aria-labelledby="hero-title">
      <img
        class="hero__bg"
        src="wiki/assets/images/munro.png"
        width="1672"
        height="941"
        alt="Watercolor mountain range with a stone path, mist, lakes, and distant ridges"
      />
      <a class="hero__cta" href="https://welbournesecurity.com/">Back to main site</a>
      <h1 class="hero__title" id="hero-title">Project Munro</h1>
    </main>
  </body>
</html>
