# Weekly dependency updates. npm minor and patch bumps arrive grouped in a
# single PR; majors get their own PRs. GitHub Actions majors are pinned in
# the workflows, so those updates arrive here too.

version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
