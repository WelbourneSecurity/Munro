# Packages the web app into installable mobile artifacts with Capacitor.
#
# The native Android and iOS projects are NOT committed to the repository —
# each run generates them fresh with `npx cap add`, syncs the built web app
# into them, patches in the location permissions the app needs, and builds:
#
#   - munro-android-apk: a debug-signed APK, directly installable on any
#     Android device that allows installs from unknown sources. It is signed
#     with the stable debug keystore committed at
#     .github/android/debug.keystore (standard public debug credentials, no
#     secret value) so that APKs from successive runs can upgrade each other
#     in place — without it, Gradle would generate a random debug key on
#     every fresh runner, upgrades would fail with
#     INSTALL_FAILED_UPDATE_INCOMPATIBLE, and the forced uninstall would
#     wipe the WebView localStorage that holds all bagged-peak progress.
#   - munro-ios-ipa: an UNSIGNED IPA. No signing secrets live in this
#     repository, so it cannot be installed as-is — it must be signed and
#     sideloaded (AltStore/SideStore, Xcode, or an Apple developer
#     certificate) before it will run on a device.
#
# Geolocation: Capacitor's WebView supports plain `navigator.geolocation`
# without the @capacitor/geolocation plugin — Android needs the location
# permissions declared in AndroidManifest.xml (Capacitor core handles the
# runtime prompt), and iOS needs NSLocationWhenInUseUsageDescription in
# Info.plist. The patch scripts below add both.
name: Mobile packaging

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mobile-packaging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android APK (debug-signed)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      # Capacitor 8's Android project builds with Java 21.
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      # Caches Gradle distributions and dependency caches between runs.
      - uses: gradle/actions/setup-gradle@v6

      - name: Install dependencies
        run: npm ci

      # Builds the web app with a relative base path (the GitHub Pages base
      # `/Munro/` would break inside the Capacitor WebView), generates the
      # Android project, syncs the web build into it, and patches the
      # manifest with ACCESS_FINE_LOCATION / ACCESS_COARSE_LOCATION for the
      # GPS summit-detection feature.
      - name: Generate Android project
        run: npm run mobile:android

      # Gradle's default debug signing config reads ~/.android/debug.keystore
      # and generates a NEW random key when it is missing — which it always
      # is on an ephemeral runner. That would give every run's APK a
      # different signature, so installing a newer artifact over an older
      # one would fail (INSTALL_FAILED_UPDATE_INCOMPATIBLE) and force an
      # uninstall that deletes the user's local progress. Installing the
      # committed stable keystore first keeps the signature identical across
      # runs, so artifacts upgrade in place and progress survives.
      - name: Install stable debug keystore
        run: |
          mkdir -p "$HOME/.android"
          cp .github/android/debug.keystore "$HOME/.android/debug.keystore"

      # assembleDebug produces a debug-signed APK — installable on-device
      # without any signing secrets, which is the right default here.
      - name: Build APK
        run: npm run mobile:android:apk

      - uses: actions/upload-artifact@v7
        with:
          name: munro-android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  ios:
    name: iOS IPA (unsigned)
    # Capacitor 8 requires Xcode 26, which needs the macos-26 image
    # (generally available since February 2026; Xcode 26.x is its default).
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Builds the web app with a relative base path, generates the iOS
      # project, syncs the web build into it, and patches Info.plist with
      # NSLocationWhenInUseUsageDescription. Capacitor 8 uses Swift Package
      # Manager for new iOS projects, so there is no Podfile and no
      # `pod install` / CocoaPods cache — its packages resolve from local
      # paths inside node_modules.
      - name: Generate iOS project
        run: npm run mobile:ios

      # Archives with code signing disabled and zips Payload/Munro.app into
      # munro-unsigned.ipa. The IPA is UNSIGNED: it must be signed and
      # sideloaded (AltStore/SideStore, Xcode, or an Apple developer
      # certificate) to install on a device.
      - name: Build unsigned IPA
        run: npm run mobile:ios:ipa

      - uses: actions/upload-artifact@v7
        with:
          name: munro-ios-ipa
          path: build/munro-unsigned.ipa
          if-no-files-found: error
