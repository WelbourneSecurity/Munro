# Deploys main to the testing site at https://munro.welbournesecurity.com.
#
# One-time repo settings (see wiki/operations.md): Pages source must be
# "Deploy from branch: gh-pages / root", and the custom domain
# munro.welbournesecurity.com set in the Pages settings. Every build ships
# public/CNAME and public/.nojekyll inside dist/, so the gh-pages branch
# keeps the domain binding after each deploy.
#
# We publish to a branch (not actions/deploy-pages) because per-PR previews
# (pr-preview.yml) share the same gh-pages branch; clean-exclude keeps the
# pr-preview/ directory alive across main deploys.
#
# Privilege separation (mirrors pr-preview.yml): the build job executes npm
# lifecycle scripts and vite build — code that a compromised dependency
# controls — so it runs with a read-only token and no persisted
# credentials. Only the deploy job gets contents: write, and it executes
# nothing from the repository; it only runs pinned actions over the
# uploaded dist artifact.

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# No workflow-level grants; each job declares the minimum it needs.
permissions: {}

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build
      # Fails the deploy when the gzip output exceeds the performance
      # budget in wiki/operations.md.
      - run: npm run perf:budget
      - uses: actions/upload-artifact@v7
        with:
          name: site-dist
          path: dist
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      # The deploy action authenticates through its own token input; the
      # checkout credential would only widen what a compromised step can do.
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v7
        with:
          name: site-dist
          path: dist
      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean-exclude: pr-preview/
          force: false

      # Guard against Pages-source drift. Publishing to gh-pages only works
      # if Settings → Pages still says "Deploy from a branch: gh-pages /
      # root". If that setting is ever flipped (e.g. to main), GitHub serves
      # the raw repository source: index.html goes out untransformed, module
      # scripts 404 or arrive as application/octet-stream and the favicon
      # breaks. Fail the deploy loudly instead of leaving the site silently
      # broken. Pages CDN propagation can take a few minutes, so poll.
      # The grep targets THIS build's hashed entry chunk (from the artifact's
      # index.html), not a generic /assets/index- string — a stale previous
      # deploy would still contain the generic string and mask a failed or
      # stalled Pages build behind a green check.
      - name: Verify the live site serves the built app
        run: |
          asset="$(grep -o '/assets/index-[A-Za-z0-9_-]*\.js' dist/index.html | head -n 1)"
          if [ -z "$asset" ]; then
            echo "::error::Could not find the hashed entry chunk in dist/index.html."
            exit 1
          fi
          echo "Expecting the live site to reference $asset"
          for i in $(seq 1 20); do
            html="$(curl -fsSL https://munro.welbournesecurity.com/ || true)"
            if printf '%s' "$html" | grep -qF "$asset"; then
              echo "Live site serves this deploy."
              curl -fsS -o /dev/null https://munro.welbournesecurity.com/favicon.svg
              exit 0
            fi
            echo "Attempt $i/20: this deploy not live yet; retrying in 30s..."
            sleep 30
          done
          echo "::error::https://munro.welbournesecurity.com is not serving the built app (raw source or stale content)."
          echo "::error::Check Settings → Pages: Source must be 'Deploy from a branch', branch gh-pages, folder / (root). See wiki/operations.md."
          exit 1
