# CodeQL static analysis for the app's JavaScript/TypeScript. Runs on PRs
# and pushes to main plus a weekly sweep. Uses codeql-action v4 (v3 is
# deprecated December 2026).

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly sweep, Monday 06:24 UTC.
    - cron: '24 6 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v4
