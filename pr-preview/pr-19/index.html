<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="description"
      content="Munro is a local-first UK hill-bagging atlas and outdoor logbook."
    />
    <!--
      viewport-fit=cover lets the app draw edge to edge on notched phones and
      makes env(safe-area-inset-*) report real values — the header and panel
      pad with them, so without it buttons sit under the iOS status bar.
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#F2EFE7" />
    <script>
      (() => {
        let preset = 'midnight';
        try {
          const raw = JSON.parse(localStorage.getItem('munro.prefs.v1') || 'null');
          const saved = raw && raw.state && raw.state.visualPreset;
          if (saved === 'midnight' || saved === 'light' || saved === 'nature') {
            preset = saved;
          }
        } catch {
          // A malformed or unavailable local preference must not block startup.
        }
        document.documentElement.dataset.visualPreset = preset;
        document.documentElement.style.colorScheme = 'light';
      })();
    </script>
    <!--
      Warm up connections to the two external hosts the map needs at startup:
      OpenFreeMap (style, vector tiles, glyphs, sprites) and AWS S3 (Terrarium
      terrain tiles). MapLibre fetches both with CORS, so the preconnect must
      be crossorigin for the connection to be reused. dns-prefetch is the
      fallback for browsers that ignore preconnect. Hosts are defined in
      src/map/config.ts — keep these in sync.
    -->
    <link rel="preconnect" href="https://tiles.openfreemap.org" crossorigin />
    <link rel="dns-prefetch" href="https://tiles.openfreemap.org" />
    <link rel="preconnect" href="https://s3.amazonaws.com" crossorigin />
    <link rel="dns-prefetch" href="https://s3.amazonaws.com" />
    <link rel="icon" type="image/svg+xml" href="/pr-preview/pr-19/favicon.svg" />
    <!--
      iOS ignores the manifest icons for home-screen installs and falls back
      to a page snapshot unless an apple-touch-icon is linked explicitly.
    -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/pr-preview/pr-19/icons/apple-touch-icon.png"
    />
    <title>Munro</title>
    <script type="module" crossorigin src="/pr-preview/pr-19/assets/index-pJBsQmd1.js"></script>
    <link rel="stylesheet" crossorigin href="/pr-preview/pr-19/assets/index-DhtVLgnq.css">
  <link rel="manifest" href="/pr-preview/pr-19/manifest.webmanifest"></head>
  <body>
    <div id="root"></div>
  </body>
</html>
